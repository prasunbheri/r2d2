<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>R2 Control Bridge</title>
<script src="/static/socket.io.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e; color: #eee; display: flex;
    flex-direction: column; align-items: center; padding: 16px; touch-action: none;
    user-select: none; -webkit-user-select: none;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  h1 { font-size: 1.5rem; margin: 8px 0 4px; color: #e94560; letter-spacing: 1px; }
  .subtitle { font-size: 0.8rem; color: #888; margin-bottom: 8px; }
  .connected { color: #2ecc71; }
  .disconnected { color: #e94560; }

  .joystick-area {
    position: relative; width: 200px; height: 200px; margin: 8px auto;
    flex-shrink: 0;
  }
  .joystick-base {
    width: 100%; height: 100%; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #16213e, #0f1629);
    border: 3px solid #2a3a6e; position: relative;
    box-shadow: 0 0 30px rgba(233,69,96,0.15), inset 0 0 20px rgba(0,0,0,0.5);
    cursor: grab; touch-action: none;
  }
  .joystick-base:active { cursor: grabbing; }
  .joystick-knob {
    position: absolute; width: 64px; height: 64px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #e94560, #c0392b);
    box-shadow: 0 4px 15px rgba(233,69,96,0.5), inset 0 -2px 6px rgba(0,0,0,0.3);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    transition: none; pointer-events: none; z-index: 2;
    border: 2px solid rgba(255,255,255,0.2);
  }
  .joystick-knob.transition {
    transition: transform 0.15s ease-out;
  }
  .center-dot {
    position: absolute; width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.15); top: 50%; left: 50%;
    transform: translate(-50%, -50%); z-index: 1;
  }
  .direction-label {
    position: absolute; font-size: 0.7rem; color: rgba(255,255,255,0.2);
    font-weight: 600; letter-spacing: 1px;
  }
  .dir-fwd { top: 8px; left: 50%; transform: translateX(-50%); }
  .dir-rev { bottom: 8px; left: 50%; transform: translateX(-50%); }
  .dir-left { left: 8px; top: 50%; transform: translateY(-50%); }
  .dir-right { right: 8px; top: 50%; transform: translateY(-50%); }

  .controls-row {
    display: flex; align-items: center; gap: 12px; margin: 8px 0;
  }
  .toggle-label {
    display: flex; align-items: center; gap: 8px; font-size: 0.85rem;
    cursor: pointer; color: #aaa;
  }
  .toggle-label.active { color: #2ecc71; }
  .toggle-switch {
    width: 44px; height: 24px; border-radius: 12px; background: #333;
    position: relative; cursor: pointer; transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-switch.active { background: #2ecc71; }
  .toggle-switch::after {
    content: ''; position: absolute; width: 20px; height: 20px;
    border-radius: 50%; background: #fff; top: 2px; left: 2px;
    transition: left 0.2s;
  }
  .toggle-switch.active::after { left: 22px; }

  .motor-display {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px 24px;
    margin: 8px 0; font-size: 0.8rem; font-family: 'Courier New', monospace;
  }
  .motor-display .m { display: flex; justify-content: space-between; gap: 8px; }
  .motor-display .m .name { color: #888; }
  .motor-display .m .val { color: #eee; min-width: 3em; text-align: right; }
  .motor-display .m .val.fwd { color: #2ecc71; }
  .motor-display .m .val.rev { color: #e94560; }

  .stop-btn {
    width: 100%; max-width: 240px; padding: 14px; margin: 8px 0;
    background: #e94560; color: #fff; border: none; border-radius: 12px;
    font-size: 1.2rem; font-weight: 700; letter-spacing: 2px;
    cursor: pointer; touch-action: manipulation;
  }
  .stop-btn:active { background: #c0392b; transform: scale(0.97); }

  .speed-row {
    width: 100%; max-width: 240px; margin: 8px 0; display: flex;
    flex-direction: column; gap: 2px;
  }
  .speed-row .slider-label {
    display: flex; justify-content: space-between; font-size: 0.75rem; color: #888;
  }
  .speed-row input[type="range"] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
    background: #333; border-radius: 3px; outline: none;
  }
  .speed-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
    background: #e94560; cursor: pointer; border: 2px solid rgba(255,255,255,0.2);
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .speed-row input[type="range"]::-moz-range-thumb {
    width: 20px; height: 20px; border-radius: 50%;
    background: #e94560; cursor: pointer; border: 2px solid rgba(255,255,255,0.2);
  }

  .cam-wrap {
    width: 100%; max-width: 360px; margin: 6px 0; border-radius: 8px;
    overflow: hidden; background: #000; aspect-ratio: 4/3;
    box-shadow: 0 0 12px rgba(0,0,0,0.4);
    flex-shrink: 0; position: relative;
  }
  .cam-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cam-wrap.hidden { display: none; }
  .cam-fps {
    position: absolute; bottom: 4px; right: 6px;
    font-size: 0.65rem; color: rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 4px;
    font-family: monospace;
  }

  .status-bar {
    font-size: 0.7rem; color: #555; text-align: center;
    margin-top: 4px;
  }

  .overlay {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(10, 10, 30, 0.75);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  .overlay.visible {
    opacity: 1; pointer-events: auto;
  }
  .overlay .msg {
    font-size: 2rem; font-weight: 700; color: #e94560;
    letter-spacing: 2px;
    animation: glow 1.5s ease-in-out infinite;
  }
  .overlay .sub {
    font-size: 1.2rem; font-weight: 600; color: #e94560;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.3; text-shadow: 0 0 8px rgba(233,69,96,0.3); }
    50% { opacity: 1; text-shadow: 0 0 24px rgba(233,69,96,0.7); }
  }

  body.disconnected .control {
    opacity: 0.4; transition: opacity 0.5s ease;
  }
  body:not(.disconnected) .control {
    opacity: 1; transition: opacity 0.5s ease;
  }

  .gear-btn {
    position: fixed; top: 12px; left: 12px; z-index: 100;
    font-size: 1.4rem; background: none; border: none; color: #666;
    cursor: pointer; touch-action: manipulation;
  }

  .conn-indicator {
    position: fixed; top: 12px; right: 12px; z-index: 50;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .conn-dot {
    width: 12px; height: 12px; border-radius: 50%;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .conn-dot.online { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
  .conn-dot.offline { background: #e94560; box-shadow: 0 0 6px #e94560; }
  .conn-label {
    font-size: 0.55rem; letter-spacing: 1px; text-transform: uppercase;
    transition: color 0.3s;
  }
  .conn-label.online { color: #2ecc71; }
  .conn-label.offline { color: #e94560; }

  .settings-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10, 10, 30, 0.5);
    backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .settings-overlay.open { opacity: 1; pointer-events: auto; }
  .settings-box {
    background: rgba(26, 26, 46, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px; padding: 32px 28px; width: 300px;
    max-height: 80vh; overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    position: relative;
  }
  .settings-box .speed-row { margin-bottom: 32px; }
  .settings-box .speed-row:last-child { margin-bottom: 0; }
  .settings-box input[type="range"] { height: 10px; }
  .settings-box input[type="range"]::-webkit-slider-thumb { width: 28px; height: 28px; }
  .settings-box input[type="range"]::-moz-range-thumb { width: 28px; height: 28px; }
  .settings-close {
    position: absolute; top: 8px; right: 12px;
    font-size: 1.1rem; background: none; border: none; color: #888;
    cursor: pointer; touch-action: manipulation;
  }
  .menu-corner-btn {
    position: absolute; background: none; border: none; cursor: pointer;
    font-size: 1.3rem; touch-action: manipulation; color: #666;
    padding: 8px; line-height: 1; transition: color 0.15s;
  }
  .menu-corner-btn:active { color: #e94560; }
  .menu-corner-btn.holding { color: #e67e22; }
  .menu-bottom-left { bottom: 6px; left: 6px; }
  .menu-bottom-right { bottom: 6px; right: 6px; }

  .stats-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10, 10, 30, 0.5);
    backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .stats-overlay.open { opacity: 1; pointer-events: auto; }
  .stats-box {
    background: rgba(26, 26, 46, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px; padding: 28px 24px; width: 300px;
    max-height: 80vh; overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    position: relative;
  }
  .stats-close {
    position: absolute; top: 8px; right: 12px;
    font-size: 1.1rem; background: none; border: none; color: #888;
    cursor: pointer; touch-action: manipulation;
  }
  .stats-row {
    display: flex; justify-content: space-between; padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 0.85rem;
  }
  .stats-row:last-child { border-bottom: none; }
  .stats-label { color: #888; }
  .stats-value { color: #eee; font-weight: 500; font-variant-numeric: tabular-nums; }
  .stats-back {
    display: block; padding: 6px 12px; margin: 14px auto 0;
    background: #2a3a6e; color: #ccc; border: none; border-radius: 6px;
    font-size: 0.75rem; font-weight: 600; letter-spacing: 1px;
    cursor: pointer; touch-action: manipulation;
  }
  .stats-back:active { background: #1e2d5a; }

  /* Landscape: video fills left, right column has joystick + controls below */
  @media (orientation: landscape) and (max-height: 500px) {
    body {
      padding: 4px; flex-direction: row; align-items: center;
      justify-content: center; gap: 6px; overflow: hidden;
    }
    body h1, body .subtitle, body .motor-display, body .status-bar,
    body > .speed-row { display: none; }
    body .cam-wrap {
      flex: 1; max-width: none; height: 100%; margin: 0;
      border-radius: 4px; aspect-ratio: auto;
    }
    body .cam-wrap img { object-fit: contain; }
    body .right-col {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; flex-shrink: 0;
    }
    body .joystick-area {
      width: 160px; height: 160px; margin: 0; flex-shrink: 0;
      opacity: 0.5; transition: opacity 0.2s;
    }
    body .joystick-area:active { opacity: 0.9; }
    body .left-controls {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px;
    }
    body .left-controls .controls-row { display: flex; margin: 0; }
    body .left-controls .toggle-label { font-size: 0.65rem; gap: 4px; }
    body .left-controls .toggle-switch { width: 32px; height: 18px; }
    body .left-controls .toggle-switch::after { width: 14px; height: 14px; }
    body .left-controls .toggle-switch.active::after { left: 16px; }
    body .left-controls .stop-btn {
      width: 64px; padding: 10px; font-size: 0.75rem; border-radius: 8px; margin: 0;
    }
    body .gear-btn { z-index: 20; }
  }
</style>
</head>
<body>
  <button class="gear-btn" id="gear-btn">⚙</button>
  <div class="conn-indicator">
    <div class="conn-dot offline" id="conn-dot"></div>
    <div class="conn-label offline" id="conn-label">offline</div>
  </div>
  <h1>R2 Control Bridge</h1>
  <div class="cam-wrap control hidden" id="cam-wrap">
    <img src="/video_feed" id="cam-feed" alt="camera">
    <div class="cam-fps" id="cam-fps">-- fps</div>
  </div>

  <div class="right-col">
    <div class="joystick-area control">
      <div class="joystick-base" id="joy-base">
        <div class="center-dot"></div>
        <div class="direction-label dir-fwd">▲ FWD</div>
        <div class="direction-label dir-rev">REV ▼</div>
        <div class="direction-label dir-left">◀ L</div>
        <div class="direction-label dir-right">R ▶</div>
        <div class="joystick-knob" id="joy-knob"></div>
      </div>
    </div>

    <div class="left-controls">
      <div class="controls-row control">
        <label class="toggle-label active" id="toggle-label">
          <span class="toggle-switch active" id="toggle-switch"></span>
          Auto-Center
        </label>
      </div>
      <button class="stop-btn control" id="stop-btn">STOP</button>
    </div>
  </div>

  <div class="motor-display control" id="motor-display"></div>

  <div class="status-bar" id="status-bar"></div>

  <div class="overlay" id="reconnect-overlay">
    <div style="font-size:0.85rem;color:#888;letter-spacing:1px">Attempting to</div>
    <div class="msg">Reconnect</div>
    <div class="sub"><span style="color:#888">in </span><span id="reconnect-sub">3</span><span style="color:#888"> seconds</span></div>
  </div>

  <div class="settings-overlay" id="settings-overlay">
    <div class="settings-box">
      <button class="settings-close" id="settings-close">✕</button>
      <div class="speed-row">
        <div class="slider-label"><span>Joystick Speed</span><span id="speed-val">70%</span></div>
        <input type="range" id="speed-slider" min="0" max="100" value="70">
      </div>
      <div class="speed-row">
        <div class="slider-label"><span>Max Speed Limiter</span><span id="limiter-val">50%</span></div>
        <input type="range" id="limiter-slider" min="0" max="100" value="50">
      </div>
      <div class="speed-row">
        <div class="slider-label"><span>Resolution</span><span id="res-val">640×480</span></div>
        <input type="range" id="res-slider" min="0" max="4" value="1" step="1">
      </div>
      <div class="speed-row">
        <div class="slider-label"><span>Frame Rate</span><span id="fps-val">12 FPS</span></div>
        <input type="range" id="fps-slider" min="0" max="60" value="12" step="1">
      </div>
      <button class="menu-corner-btn menu-bottom-left" id="shutdown-btn">⏻</button>
      <button class="menu-corner-btn menu-bottom-right" id="stats-btn">ℹ</button>
    </div>
  </div>

  <div class="stats-overlay" id="stats-overlay">
    <div class="stats-box">
      <button class="stats-close" id="stats-close">✕</button>
      <div class="stats-row"><span class="stats-label">Camera FPS</span><span class="stats-value" id="s-fps">--</span></div>
      <div class="stats-row"><span class="stats-label">Frame Rate</span><span class="stats-value" id="s-fps-target">--</span></div>
      <div class="stats-row"><span class="stats-label">Resolution</span><span class="stats-value" id="s-res">--</span></div>
      <div class="stats-row"><span class="stats-label">CPU (1m)</span><span class="stats-value" id="s-cpu">--</span></div>
      <div class="stats-row"><span class="stats-label">Memory</span><span class="stats-value" id="s-mem">--</span></div>
      <div class="stats-row"><span class="stats-label">Temperature</span><span class="stats-value" id="s-temp">--</span></div>
      <div class="stats-row"><span class="stats-label">TX Rate</span><span class="stats-value" id="s-tx">--</span></div>
      <div class="stats-row"><span class="stats-label">RX Rate</span><span class="stats-value" id="s-rx">--</span></div>
      <div class="stats-row"><span class="stats-label">Threads</span><span class="stats-value" id="s-threads">--</span></div>
      <button class="stats-back" id="stats-back">Back to Settings</button>
    </div>
  </div>

<script>
const MOTORS = ['FL', 'FR', 'RL', 'RR'];
const MOTOR_NAMES = { FL: 'Front L', FR: 'Front R', RL: 'Rear L', RR: 'Rear R' };

const knob = document.getElementById('joy-knob');
const base = document.getElementById('joy-base');
const connDot = document.getElementById('conn-dot');
const connLabel = document.getElementById('conn-label');
const statusBar = document.getElementById('status-bar');
const stopBtn = document.getElementById('stop-btn');
const toggleSwitch = document.getElementById('toggle-switch');
const toggleLabel = document.getElementById('toggle-label');
const motorDisplay = document.getElementById('motor-display');
const speedSlider = document.getElementById('speed-slider');
const speedVal = document.getElementById('speed-val');
const limiterSlider = document.getElementById('limiter-slider');
const limiterVal = document.getElementById('limiter-val');
const resSlider = document.getElementById('res-slider');
const resVal = document.getElementById('res-val');
const RES_LABELS = ['320×240', '640×480', '800×600', '1024×768', '1280×960'];
const fpsSlider = document.getElementById('fps-slider');
const fpsVal = document.getElementById('fps-val');
function fpsLabel(v) { return v == 0 ? 'Off' : (v == 60 ? 'Uncapped' : v + ' FPS'); }

const RADIUS = 68;
const MIN_SPEED = 10;   // units/sec
const MAX_SPEED = 300;  // units/sec
let autoCenter = true;
let active = false;
let joyX = 0;
let joyY = 0;
let targetX = 0;
let targetY = 0;
let currentSpeeds = { FL: 0, FR: 0, RL: 0, RR: 0 };

// Build motor display
MOTORS.forEach(m => {
  const row = document.createElement('div');
  row.className = 'm';
  row.innerHTML = `<span class="name">${MOTOR_NAMES[m]}</span><span class="val" id="disp-${m}">0</span>`;
  motorDisplay.appendChild(row);
});

function updateDisplay() {
  MOTORS.forEach(m => {
    const el = document.getElementById('disp-' + m);
    const v = currentSpeeds[m];
    el.textContent = v.toFixed(2);
    el.className = 'val' + (v > 0 ? ' fwd' : v < 0 ? ' rev' : '');
  });
}

function computeMotorSpeeds(x, y) {
  const limit = parseInt(limiterSlider.value) / 100;
  const fl = (y + x) * limit;
  const fr = (y - x) * limit;
  const rl = (y + x) * limit;
  const rr = (y - x) * limit;
  return {
    FL: Math.max(-100, Math.min(100, fl)),
    FR: Math.max(-100, Math.min(100, fr)),
    RL: Math.max(-100, Math.min(100, rl)),
    RR: Math.max(-100, Math.min(100, rr)),
  };
}

let lastSpeedSend = 0;
const SPEED_THROTTLE = 50; // ms — limits server thread creation

function sendSpeeds(speeds) {
  const now = Date.now();
  if (now - lastSpeedSend >= SPEED_THROTTLE) {
    socket.emit('set_speeds', { speeds });
    lastSpeedSend = now;
  }
  currentSpeeds = speeds;
  updateDisplay();
}

function flushSpeeds() {
  const speeds = computeMotorSpeeds(joyX, joyY);
  socket.emit('set_speeds', { speeds });
  lastSpeedSend = Date.now();
}

function clientToJoy(clientX, clientY) {
  const rect = base.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = clientX - cx;
  const dy = clientY - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const maxDist = RADIUS;
  let clampedX = dx, clampedY = dy;
  if (dist > maxDist) {
    clampedX = (dx / dist) * maxDist;
    clampedY = (dy / dist) * maxDist;
  }
  return {
    joyX: (clampedX / maxDist) * 100,
    joyY: -(clampedY / maxDist) * 100,
    pxX: clampedX,
    pxY: clampedY,
  };
}

function applyJoy(x, y) {
  joyX = x; joyY = y;
  const maxDist = RADIUS;
  knob.style.transform = `translate(calc(-50% + ${(x / 100) * maxDist}px), calc(-50% + ${-(y / 100) * maxDist}px))`;
  const speeds = computeMotorSpeeds(x, y);
  sendSpeeds(speeds);
}

let chaseId = null;

function chaseStep() {
  const dx = targetX - joyX;
  const dy = targetY - joyY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < 0.5) {
    applyJoy(targetX, targetY);
    chaseId = null;
    return;
  }

  const s = parseInt(speedSlider.value);
  const speed = MIN_SPEED + (MAX_SPEED - MIN_SPEED) * s / 100;
  const maxMove = speed / 60;
  const step = Math.min(maxMove / dist, 1);

  applyJoy(joyX + dx * step, joyY + dy * step);
  chaseId = requestAnimationFrame(chaseStep);
}

function startChase(endX, endY) {
  targetX = endX;
  targetY = endY;
  if (chaseId === null) {
    chaseId = requestAnimationFrame(chaseStep);
  }
}

function stopChase() {
  if (chaseId !== null) {
    cancelAnimationFrame(chaseId);
    chaseId = null;
  }
}

// Mouse events
base.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  if (active) return;
  stopChase();
  active = true;
  const t = clientToJoy(e.clientX, e.clientY);
  startChase(t.joyX, t.joyY);
});

document.addEventListener('mousemove', (e) => {
  if (!active) return;
  const t = clientToJoy(e.clientX, e.clientY);
  startChase(t.joyX, t.joyY);
});

document.addEventListener('mouseup', () => {
  if (!active) return;
  active = false;
  if (autoCenter) {
    startChase(0, 0);
  } else {
    // Already at targetX/targetY — flush ensures last speed is sent
    flushSpeeds();
  }
});

// Touch events
base.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (active) return;
  stopChase();
  active = true;
  const t = e.touches[0];
  startChase(clientToJoy(t.clientX, t.clientY).joyX, clientToJoy(t.clientX, t.clientY).joyY);
}, { passive: false });

document.addEventListener('touchmove', (e) => {
  if (!active) return;
  e.preventDefault();
  const t = e.touches[0];
  startChase(clientToJoy(t.clientX, t.clientY).joyX, clientToJoy(t.clientX, t.clientY).joyY);
}, { passive: false });

document.addEventListener('touchend', (e) => {
  if (!active) return;
  active = false;
  if (autoCenter) {
    startChase(0, 0);
  } else {
    flushSpeeds();
  }
});

// Speed slider (controls return-to-center damping)
speedSlider.addEventListener('input', () => {
  speedVal.textContent = speedSlider.value + '%';
});

// Speed Limiter slider (scales motor output)
limiterSlider.addEventListener('input', () => {
  limiterVal.textContent = limiterSlider.value + '%';
  if (active) {
    const speeds = computeMotorSpeeds(joyX, joyY);
    sendSpeeds(speeds);
  }
});

// Resolution slider
resSlider.addEventListener('input', async () => {
  const idx = parseInt(resSlider.value);
  resVal.textContent = RES_LABELS[idx];
  try {
    const r = await fetch('/api/set_resolution', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({index: idx}),
    });
    const d = await r.json();
    if (d.ok) {
      const cam = document.getElementById('cam-feed');
      cam.src = '/video_feed?' + Date.now();
    }
  } catch (_) {}
});

// Frame rate slider
fpsSlider.addEventListener('input', async () => {
  const v = parseInt(fpsSlider.value);
  fpsVal.textContent = fpsLabel(v);
  try {
    await fetch('/api/set_framerate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({fps: v}),
    });
  } catch (_) {}
});

// Shutdown button – 5s long-press, icon countdown
const shutdownBtn = document.getElementById('shutdown-btn');
let shutdownTimer = null;
let shutdownCountdown = 0;
let shutdownHolding = false;

function shutdownAbort() {
  if (!shutdownHolding) return;
  shutdownHolding = false;
  clearInterval(shutdownTimer);
  shutdownBtn.innerHTML = '⏻';
  shutdownBtn.classList.remove('holding');
}

function shutdownStart() {
  if (shutdownHolding) return;
  shutdownHolding = true;
  shutdownCountdown = 5;
  shutdownBtn.textContent = '5';
  shutdownBtn.classList.add('holding');
  shutdownTimer = setInterval(() => {
    shutdownCountdown--;
    if (shutdownCountdown <= 0) {
      clearInterval(shutdownTimer);
      shutdownBtn.innerHTML = '⏻';
      shutdownBtn.classList.remove('holding');
      shutdownHolding = false;
      if (confirm('Shut down the Pi?')) {
        document.getElementById('settings-overlay').classList.remove('open');
        fetch('/api/shutdown', { method: 'POST' });
      }
      return;
    }
    shutdownBtn.textContent = shutdownCountdown;
  }, 1000);
}

shutdownBtn.addEventListener('mousedown', shutdownStart);
shutdownBtn.addEventListener('touchstart', (e) => { e.preventDefault(); shutdownStart(); }, { passive: false });
document.addEventListener('mouseup', shutdownAbort);
document.addEventListener('touchend', shutdownAbort);
document.addEventListener('mouseleave', shutdownAbort);
document.addEventListener('touchcancel', shutdownAbort);

// FPS counter via camera_status polling (2s interval to reduce server load)
const fpsEl = document.getElementById('cam-fps');
let fpsPoll = setInterval(async () => {
  try {
    const r = await fetch('/api/camera_status');
    const d = await r.json();
    const fps = d.fps || 0;
    fpsEl.textContent = Math.round(fps) + ' fps';
  } catch (_) {}
}, 2000);

// Toggle auto-center
toggleSwitch.addEventListener('click', () => {
  autoCenter = !autoCenter;
  toggleSwitch.classList.toggle('active', autoCenter);
  toggleLabel.classList.toggle('active', autoCenter);
  if (autoCenter && (joyX !== 0 || joyY !== 0)) {
    active = false;
    startChase(0, 0);
  }
});

// Stop button
stopBtn.addEventListener('click', () => {
  stopChase();
  active = false;
  targetX = targetY = 0;
  applyJoy(0, 0);
  flushSpeeds();
});

// Gear button – toggle settings overlay
document.getElementById('gear-btn').addEventListener('click', () => {
  document.getElementById('settings-overlay').classList.toggle('open');
});
document.getElementById('settings-close').addEventListener('click', () => {
  document.getElementById('settings-overlay').classList.remove('open');
});

// Stats overlay
const statsOverlay = document.getElementById('stats-overlay');
const settingsOverlay = document.getElementById('settings-overlay');
let statsInterval = null;
async function fetchStats() {
  try {
    const r = await fetch('/api/stats');
    const d = await r.json();
    document.getElementById('s-fps').textContent = d.fps;
    document.getElementById('s-fps-target').textContent = d.fps_target;
    document.getElementById('s-res').textContent = d.resolution.join('\u00d7');
    document.getElementById('s-cpu').textContent = (parseFloat(d.load[0]) * 100).toFixed(0) + '%';
    const mt = parseInt(d.memory.MemTotal) / 1024 || 0;
    const ma = parseInt(d.memory.MemAvailable) / 1024 || 0;
    document.getElementById('s-mem').textContent = ma.toFixed(0) + ' / ' + mt.toFixed(0) + ' MB';
    document.getElementById('s-temp').textContent = d.temp.replace('temp=', '');
    document.getElementById('s-tx').textContent = d.tx_rate_kbps < 1000 ? d.tx_rate_kbps + ' KB/s' : (d.tx_rate_kbps / 1024).toFixed(1) + ' MB/s';
    document.getElementById('s-rx').textContent = d.rx_rate_kbps < 1000 ? d.rx_rate_kbps + ' KB/s' : (d.rx_rate_kbps / 1024).toFixed(1) + ' MB/s';
    document.getElementById('s-threads').textContent = d.thread_count;
  } catch (_) {}
}
document.getElementById('stats-btn').addEventListener('click', () => {
  settingsOverlay.classList.remove('open');
  statsOverlay.classList.add('open');
  fetchStats();
  if (!statsInterval) statsInterval = setInterval(fetchStats, 5000);
});
function closeStats() {
  statsOverlay.classList.remove('open');
  settingsOverlay.classList.add('open');
  if (statsInterval) { clearInterval(statsInterval); statsInterval = null; }
}
document.getElementById('stats-close').addEventListener('click', closeStats);
document.getElementById('stats-back').addEventListener('click', closeStats);

const overlay = document.getElementById('reconnect-overlay');
const reconnectSub = document.getElementById('reconnect-sub');

let countdownTimer = null;
let countdown = 3;
let countdownPause = false;

const socket = io({
  reconnectionDelay: 5000,
  reconnectionDelayMax: 5000,
  randomizationFactor: 0,
});

socket.on('connect', () => {
  countdownPause = false;
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  document.body.classList.remove('disconnected');
  overlay.classList.remove('visible');
  connDot.className = 'conn-dot online';
  connLabel.textContent = 'online';
  connLabel.className = 'conn-label online';
  statusBar.textContent = '';
  const cam = document.getElementById('cam-feed');
  if (cam) cam.src = '/video_feed?' + Date.now();
});

socket.on('disconnect', () => {
  countdown = 3;
  reconnectSub.textContent = '3';
  document.body.classList.add('disconnected');
  overlay.classList.add('visible');
  connDot.className = 'conn-dot offline';
  connLabel.textContent = 'offline';
  connLabel.className = 'conn-label offline';
  statusBar.textContent = 'Connection lost.';
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    if (countdownPause) return;
    countdown--;
    if (countdown < 0) {
      countdownPause = true;
      reconnectSub.textContent = '';
      setTimeout(() => { countdown = 3; reconnectSub.textContent = 3; countdownPause = false; }, 1000);
      return;
    }
    reconnectSub.textContent = countdown;
  }, 1000);
});

socket.io.on('reconnect_attempt', () => {
  countdownPause = false;
  countdown = 3;
  reconnectSub.textContent = '3';
});

socket.on('camera_status', (data) => {
  const camWrap = document.getElementById('cam-wrap');
  const cam = document.getElementById('cam-feed');
  if (data.available) {
    camWrap.classList.remove('hidden');
    cam.src = '/video_feed?' + Date.now();
    if (camPoll) { clearInterval(camPoll); camPoll = null; }
  } else {
    camWrap.classList.add('hidden');
    if (!camPoll) startCamPoll();
  }
});

let camPoll = null;
function startCamPoll() {
  if (camPoll) return;
  camPoll = setInterval(async () => {
    try {
      const r = await fetch('/api/camera_status');
      const d = await r.json();
      if (d.available) {
        clearInterval(camPoll); camPoll = null;
        const camWrap = document.getElementById('cam-wrap');
        const cam = document.getElementById('cam-feed');
        camWrap.classList.remove('hidden');
        cam.src = '/video_feed?' + Date.now();
      }
    } catch (_) {}
  }, 3000);
}
startCamPoll();

socket.on('status', () => {
  // server echoes not used — client is the authoritative speed source
});
</script>
</body>
